<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图像真伪检测</title>
    <script>
      ;(() => {
        const taskToRecord = new Map()
        const recordToTask = new Map()
        const bboxByRecord = new Map()
        const bboxByTask = new Map()
        const rawFetch = window.fetch.bind(window)
        const asObj = (v) => (v && typeof v === 'object' && !Array.isArray(v) ? v : null)
        const pick = (o, keys, d = undefined) => {
          if (!o) return d
          for (const k of keys) if (o[k] !== undefined && o[k] !== null) return o[k]
          return d
        }
        const asNum = (v, d = 0) => {
          const n = Number(v)
          return Number.isFinite(n) ? n : d
        }
        const parseBBox = (v) => {
          if (Array.isArray(v)) return v
          if (typeof v === 'string') {
            try {
              const x = JSON.parse(v)
              return Array.isArray(x) ? x : null
            } catch {
              return null
            }
          }
          return null
        }

        function normalizeHistory(json, reqPage, reqPageSize) {
          const root = asObj(json) || {}
          const data = asObj(root.data) || root
          const list = Array.isArray(data.items)
            ? data.items
            : Array.isArray(data.records)
              ? data.records
              : Array.isArray(data.list)
                ? data.list
                : Array.isArray(data)
                  ? data
                  : []

          const items = list
            .map((it) => {
              const row = asObj(it)
              if (!row) return null
              const id = pick(row, ['id', 'record_id', 'recordId'])
              if (id == null) return null
              const taskIdRaw = pick(row, ['task_id', 'taskId'], null)
              const taskId = taskIdRaw != null && String(taskIdRaw).trim() !== '' ? String(taskIdRaw) : String(id)
              if (taskId != null) {
                taskToRecord.set(String(taskId), String(id))
                recordToTask.set(String(id), String(taskId))
              }
              const bbox = parseBBox(pick(row, ['bbox'], null))
              if (bbox && bbox.length >= 4) {
                bboxByRecord.set(String(id), bbox)
                if (taskId) bboxByTask.set(String(taskId), bbox)
              }
              const outcome =
                asObj(row.outcome) ||
                {
                  result: asObj(pick(row, ['result', 'detect_result', 'prediction_result'], null)),
                  multi_results: pick(row, ['multi_results', 'multiResults', 'results'], []),
                  error_msg: pick(row, ['error_msg', 'errorMsg', 'message', 'detail'], null),
                }
              return {
                id,
                created_at: pick(row, ['created_at', 'createdAt', 'create_time', 'createTime'], ''),
                mode: pick(row, ['mode'], 'unknown'),
                task_id: taskId,
                original_filename: pick(
                  row,
                  ['original_filename', 'originalFilename', 'file_name', 'filename'],
                  '',
                ),
                bbox,
                status: String(pick(row, ['status'], 'COMPLETED')).toUpperCase(),
                outcome,
              }
            })
            .filter(Boolean)

          return {
            data: {
              items,
              total: asNum(pick(data, ['total', 'count', 'total_count'], items.length), items.length),
              page: asNum(pick(data, ['page'], reqPage), reqPage),
              page_size: asNum(pick(data, ['page_size', 'pageSize'], reqPageSize), reqPageSize),
            },
          }
        }

        window.fetch = async (input, init) => {
          let req =
            typeof input === 'string' || input instanceof URL ? new Request(input, init) : input

          try {
            const url = new URL(req.url, window.location.origin)
            const m = url.pathname.match(/\/ai-detection\/api\/v1\/history\/([^/]+)\/image$/)
            if (m) {
              const key = decodeURIComponent(m[1] || '')
              let taskId = null
              let recordId = null

              if (key && !/^\d+$/.test(key) && taskToRecord.has(key)) {
                taskId = key
                recordId = taskToRecord.get(key)
              } else if (key && /^\d+$/.test(key)) {
                recordId = key
                taskId = recordToTask.get(String(key)) || null
              }

              // v1 历史图片接口统一返回原图，保证“预览”始终展示原始图片。
              if (recordId) {
                url.pathname = url.pathname.replace(`/${m[1]}/image`, `/${encodeURIComponent(recordId)}/image`)
                req = new Request(url.toString(), req)
              }
            }
          } catch {}

          const resp = await rawFetch(req)
          try {
            const u = new URL(req.url, window.location.origin)
            if (u.pathname === '/ai-detection/api/v1/history') {
              const page = asNum(u.searchParams.get('page'), 1)
              const pageSize = asNum(u.searchParams.get('page_size'), 20)
              const txt = await resp.clone().text()
              const json = txt ? JSON.parse(txt) : {}
              const normalized = normalizeHistory(json, page, pageSize)
              return new Response(JSON.stringify(normalized), {
                status: resp.status,
                statusText: resp.statusText,
                headers: { 'Content-Type': 'application/json' },
              })
            }
          } catch {}
          return resp
        }

        // 暴露给后续 DOM 叠框脚本使用
        window.__AI_DET_BRIDGE__ = {
          taskToRecord,
          recordToTask,
          bboxByRecord,
          bboxByTask,
        }
      })()
    </script>
    <script type="module" crossorigin src="./assets/index-BjQnPnbX.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CyoonwUc.css">
    <style>
      /* Fix cramped text/image in iframe embedding layout */
      .history-main .history-file {
        white-space: normal !important;
        word-break: break-word !important;
        overflow-wrap: anywhere !important;
        line-height: 1.5 !important;
        max-height: none !important;
        display: block !important;
        overflow: visible !important;
        text-overflow: clip !important;
      }

      .history-main .history-item,
      .history-main .record-item {
        align-items: flex-start !important;
      }

      .history-main .history-time,
      .history-main .history-file,
      .history-main .history-status {
        transform: none !important;
        letter-spacing: normal !important;
      }

      .viz-frame {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 160px;
      }

      .viz-frame img,
      .viz-img {
        display: block !important;
        max-width: 100% !important;
        height: auto !important;
        object-fit: contain !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function () {
        try {
          if (new URLSearchParams(location.search).get('embed') !== '1') return
          document.documentElement.classList.add('portal-embed')
          function hideTopbar() {
            var el = document.querySelector('.topbar')
            if (el) {
              el.style.setProperty('display', 'none', 'important')
              return true
            }
            return false
          }
          function tightenLayout() {
            var main = document.querySelector('.main')
            if (main) {
              main.style.setProperty('padding-top', '0.75rem', 'important')
            }
          }
          function run() {
            if (hideTopbar()) {
              tightenLayout()
              return
            }
            var obs = new MutationObserver(function () {
              if (hideTopbar()) {
                tightenLayout()
                obs.disconnect()
              }
            })
            var root = document.body || document.documentElement
            obs.observe(root, { childList: true, subtree: true })
            setTimeout(function () {
              obs.disconnect()
            }, 8000)
          }
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', run)
          } else {
            run()
          }
        } catch (e) {}
      })()
    </script>
    <script>
      ;(() => {
        const getBridge = () => window.__AI_DET_BRIDGE__ || null

        const toRect = (bbox, naturalW, naturalH, clientW, clientH) => {
          if (!Array.isArray(bbox) || bbox.length < 4) return null
          let x = Number(bbox[0]) || 0
          let y = Number(bbox[1]) || 0
          let w = Number(bbox[2]) || 0
          let h = Number(bbox[3]) || 0
          if (w <= 0 || h <= 0) return null

          // 若后端返回的是 x1,y1,x2,y2，则转换成 x,y,w,h
          if (x + w > naturalW * 1.5 || y + h > naturalH * 1.5) {
            const x2 = Number(bbox[2]) || x
            const y2 = Number(bbox[3]) || y
            w = Math.max(0, x2 - x)
            h = Math.max(0, y2 - y)
          }
          if (w <= 0 || h <= 0) return null

          const sx = clientW / Math.max(1, naturalW)
          const sy = clientH / Math.max(1, naturalH)
          return {
            left: x * sx,
            top: y * sy,
            width: w * sx,
            height: h * sy,
          }
        }

        const ensureOverlay = (img) => {
          if (!img || !(img instanceof HTMLImageElement)) return null
          const parent = img.parentElement
          if (!parent) return null

          if (getComputedStyle(parent).position === 'static') {
            parent.style.position = 'relative'
          }
          let box = parent.querySelector('.ai-bbox-overlay')
          if (!box) {
            box = document.createElement('div')
            box.className = 'ai-bbox-overlay'
            box.style.position = 'absolute'
            box.style.pointerEvents = 'none'
            box.style.border = '2px solid #1e66ff'
            box.style.boxShadow = '0 0 0 1px rgba(255,255,255,0.75) inset'
            box.style.borderRadius = '4px'
            box.style.zIndex = '9'
            parent.appendChild(box)
          }
          return box
        }

        const findReportImage = () => {
          const reportTitle = Array.from(document.querySelectorAll('h1,h2,h3,h4,div,span,p')).find((el) =>
            (el.textContent || '').replace(/\s+/g, '').includes('检测报告'),
          )
          if (reportTitle) {
            const card = reportTitle.closest('.card, .panel, .report, .section') || reportTitle.parentElement
            if (card) {
              const img = card.querySelector('img')
              if (img) return img
            }
          }
          return null
        }

        const pickBBox = () => {
          const bridge = getBridge()
          if (!bridge) return null

          const taskVals = Array.from(bridge.bboxByTask.values())
          if (taskVals.length) return taskVals[taskVals.length - 1]
          const recVals = Array.from(bridge.bboxByRecord.values())
          if (recVals.length) return recVals[recVals.length - 1]
          return null
        }

        const pickTaskId = () => {
          const bridge = getBridge()
          if (!bridge) return null
          const taskKeys = Array.from(bridge.bboxByTask.keys())
          if (taskKeys.length) return taskKeys[taskKeys.length - 1]
          const vals = Array.from(bridge.recordToTask.values())
          if (vals.length) return vals[vals.length - 1]
          return null
        }

        const ensureReportVisualization = (img) => {
          if (!img || img.dataset.aiVizReady === '1') return
          const taskId = pickTaskId()
          if (!taskId) return
          const vizSrc = `/ai-detection/api/v3/result/${encodeURIComponent(taskId)}/visualization`
          if (!img.dataset.aiOrigSrc) {
            img.dataset.aiOrigSrc = img.currentSrc || img.src || ''
          }
          img.onerror = () => {
            const orig = img.dataset.aiOrigSrc || ''
            if (orig) img.src = orig
          }
          img.dataset.aiVizReady = '1'
          img.src = vizSrc
        }

        const drawReportBBox = () => {
          const img = findReportImage()
          if (!img) return
          ensureReportVisualization(img)
          if (!img.complete || !img.naturalWidth || !img.naturalHeight) return

          const bbox = pickBBox()
          if (!bbox) return

          const overlay = ensureOverlay(img)
          if (!overlay) return

          const rect = toRect(bbox, img.naturalWidth, img.naturalHeight, img.clientWidth, img.clientHeight)
          if (!rect) return
          overlay.style.left = `${Math.max(0, rect.left)}px`
          overlay.style.top = `${Math.max(0, rect.top)}px`
          overlay.style.width = `${Math.max(2, rect.width)}px`
          overlay.style.height = `${Math.max(2, rect.height)}px`
          overlay.style.display = 'block'
        }

        const run = () => {
          drawReportBBox()
          const obs = new MutationObserver(() => drawReportBBox())
          const root = document.body || document.documentElement
          obs.observe(root, { childList: true, subtree: true, attributes: true })
          window.addEventListener('resize', drawReportBBox)
          setInterval(drawReportBBox, 1200)
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', run)
        } else {
          run()
        }
      })()
    </script>
  </body>
</html>
