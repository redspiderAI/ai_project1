<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图像真伪检测</title>
    <script>
      ;(() => {
        const taskToRecord = new Map()
        const recordToTask = new Map()
        const rawFetch = window.fetch.bind(window)
        const asObj = (v) => (v && typeof v === 'object' && !Array.isArray(v) ? v : null)
        const pick = (o, keys, d = undefined) => {
          if (!o) return d
          for (const k of keys) if (o[k] !== undefined && o[k] !== null) return o[k]
          return d
        }
        const asNum = (v, d = 0) => {
          const n = Number(v)
          return Number.isFinite(n) ? n : d
        }
        const parseBBox = (v) => {
          if (Array.isArray(v)) return v
          if (typeof v === 'string') {
            try {
              const x = JSON.parse(v)
              return Array.isArray(x) ? x : null
            } catch {
              return null
            }
          }
          return null
        }

        function normalizeHistory(json, reqPage, reqPageSize) {
          const root = asObj(json) || {}
          const data = asObj(root.data) || root
          const list = Array.isArray(data.items)
            ? data.items
            : Array.isArray(data.records)
              ? data.records
              : Array.isArray(data.list)
                ? data.list
                : Array.isArray(data)
                  ? data
                  : []

          const items = list
            .map((it) => {
              const row = asObj(it)
              if (!row) return null
              const id = pick(row, ['id', 'record_id', 'recordId'])
              if (id == null) return null
              const taskIdRaw = pick(row, ['task_id', 'taskId'], null)
              const taskId = taskIdRaw != null && String(taskIdRaw).trim() !== '' ? String(taskIdRaw) : String(id)
              if (taskId != null) {
                taskToRecord.set(String(taskId), String(id))
                recordToTask.set(String(id), String(taskId))
              }
              const outcome =
                asObj(row.outcome) ||
                {
                  result: asObj(pick(row, ['result', 'detect_result', 'prediction_result'], null)),
                  multi_results: pick(row, ['multi_results', 'multiResults', 'results'], []),
                  error_msg: pick(row, ['error_msg', 'errorMsg', 'message', 'detail'], null),
                }
              return {
                id,
                created_at: pick(row, ['created_at', 'createdAt', 'create_time', 'createTime'], ''),
                mode: pick(row, ['mode'], 'unknown'),
                task_id: taskId,
                original_filename: pick(
                  row,
                  ['original_filename', 'originalFilename', 'file_name', 'filename'],
                  '',
                ),
                bbox: parseBBox(pick(row, ['bbox'], null)),
                status: String(pick(row, ['status'], 'COMPLETED')).toUpperCase(),
                outcome,
              }
            })
            .filter(Boolean)

          return {
            data: {
              items,
              total: asNum(pick(data, ['total', 'count', 'total_count'], items.length), items.length),
              page: asNum(pick(data, ['page'], reqPage), reqPage),
              page_size: asNum(pick(data, ['page_size', 'pageSize'], reqPageSize), reqPageSize),
            },
          }
        }

        window.fetch = async (input, init) => {
          let req =
            typeof input === 'string' || input instanceof URL ? new Request(input, init) : input

          try {
            const url = new URL(req.url, window.location.origin)
            const m = url.pathname.match(/\/ai-detection\/api\/v1\/history\/([^/]+)\/image$/)
            if (m) {
              const key = decodeURIComponent(m[1] || '')
              let taskId = null
              let recordId = null

              if (key && !/^\d+$/.test(key) && taskToRecord.has(key)) {
                taskId = key
                recordId = taskToRecord.get(key)
              } else if (key && /^\d+$/.test(key)) {
                recordId = key
                taskId = recordToTask.get(String(key)) || null
              }

              // 优先尝试 v3 标注可视化图（带检测框），失败再回退到 v1 历史原图。
              if (taskId) {
                const vizPath = `/ai-detection/api/v3/result/${encodeURIComponent(taskId)}/visualization`
                const vizUrl = getBase() ? (getBase() + vizPath) : vizPath
                const vizResp = await rawFetch(new Request(vizUrl, req))
                if (vizResp.ok) return vizResp
              }

              if (recordId) {
                url.pathname = url.pathname.replace(`/${m[1]}/image`, `/${encodeURIComponent(recordId)}/image`)
                req = new Request(url.toString(), req)
              }
            }
          } catch {}

          const resp = await rawFetch(req)
          try {
            const u = new URL(req.url, window.location.origin)
            if (u.pathname === '/ai-detection/api/v1/history') {
              const page = asNum(u.searchParams.get('page'), 1)
              const pageSize = asNum(u.searchParams.get('page_size'), 20)
              const txt = await resp.clone().text()
              const json = txt ? JSON.parse(txt) : {}
              const normalized = normalizeHistory(json, page, pageSize)
              return new Response(JSON.stringify(normalized), {
                status: resp.status,
                statusText: resp.statusText,
                headers: { 'Content-Type': 'application/json' },
              })
            }
          } catch {}
          return resp
        }
      })()
    </script>
    <script type="module" crossorigin src="./assets/index-BjQnPnbX.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CyoonwUc.css">
    <style>
      /* Fix cramped text/image in iframe embedding layout */
      .history-main .history-file {
        white-space: normal !important;
        word-break: break-all !important;
        line-height: 1.3 !important;
        display: -webkit-box !important;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden !important;
      }

      .viz-frame {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 160px;
      }

      .viz-frame img,
      .viz-img {
        display: block !important;
        max-width: 100% !important;
        height: auto !important;
        object-fit: contain !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function () {
        try {
          if (new URLSearchParams(location.search).get('embed') !== '1') return
          document.documentElement.classList.add('portal-embed')
          function hideTopbar() {
            var el = document.querySelector('.topbar')
            if (el) {
              el.style.setProperty('display', 'none', 'important')
              return true
            }
            return false
          }
          function tightenLayout() {
            var main = document.querySelector('.main')
            if (main) {
              main.style.setProperty('padding-top', '0.75rem', 'important')
            }
          }
          function run() {
            if (hideTopbar()) {
              tightenLayout()
              return
            }
            var obs = new MutationObserver(function () {
              if (hideTopbar()) {
                tightenLayout()
                obs.disconnect()
              }
            })
            var root = document.body || document.documentElement
            obs.observe(root, { childList: true, subtree: true })
            setTimeout(function () {
              obs.disconnect()
            }, 8000)
          }
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', run)
          } else {
            run()
          }
        } catch (e) {}
      })()
    </script>
  </body>
</html>
