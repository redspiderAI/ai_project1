<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图像真伪检测</title>
    <script type="module" crossorigin src="./assets/index-BjQnPnbX.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CyoonwUc.css">
    <style>
      /* Fix cramped text/image in iframe embedding layout */
      .history-main .history-file {
        white-space: normal !important;
        word-break: break-all !important;
        line-height: 1.3 !important;
        display: -webkit-box !important;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden !important;
      }

      .viz-frame {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 160px;
      }

      .viz-frame img,
      .viz-img {
        display: block !important;
        max-width: 100% !important;
        height: auto !important;
        object-fit: contain !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function () {
        try {
          if (new URLSearchParams(location.search).get('embed') !== '1') return
          document.documentElement.classList.add('portal-embed')
          function hideTopbar() {
            var el = document.querySelector('.topbar')
            if (el) {
              el.style.setProperty('display', 'none', 'important')
              return true
            }
            return false
          }
          function tightenLayout() {
            var main = document.querySelector('.main')
            if (main) {
              main.style.setProperty('padding-top', '0.75rem', 'important')
            }
          }
          function run() {
            if (hideTopbar()) {
              tightenLayout()
              return
            }
            var obs = new MutationObserver(function () {
              if (hideTopbar()) {
                tightenLayout()
                obs.disconnect()
              }
            })
            var root = document.body || document.documentElement
            obs.observe(root, { childList: true, subtree: true })
            setTimeout(function () {
              obs.disconnect()
            }, 8000)
          }
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', run)
          } else {
            run()
          }
        } catch (e) {}
      })()
    </script>
  </body>
</html>
