# alias avoids any interaction with a parent "root" in pd.conf; must match deploy path.
# 长耗时检测：在含 proxy_pass 的 location / 里建议 proxy_read_timeout 600s;（与前端/Vite 10 分钟一致）
location ^~ /project3/assets/ {
    alias /var/www/html/project3/assets/;
    access_log off;
    expires 7d;
}

location ^~ /project3/ {
    root /var/www/html;
    index index.html;
    try_files $uri $uri/ /project3/index.html;
}

location = /project3 {
    return 301 /project3/;
}
