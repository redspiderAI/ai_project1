# =============================================================================
# 用法（在 Ubuntu 服务器上）：
# 1) 备份：sudo cp /etc/nginx/sites-enabled/default /etc/nginx/sites-enabled/default.bak
# 2) 编辑：sudo nano /etc/nginx/sites-enabled/default
# 3) 删除原来的整个 server { ... } 块，把下面这个 server { ... } 整段粘贴进去
# 4) 若你的检测服务不是本机 8002 端口，改下面 BACKEND 那一行的端口号
# 5) 检查并重载：sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # 上传大图时可加大（若 API 走 Nginx 反代）
    client_max_body_size 50m;

    # ---------- 前端：先匹配 assets，避免 try_files 回退成 index.html 导致 JS 当 HTML 执行（白屏）----------
    location ^~ /project3/assets/ {
        alias /var/www/html/project3/assets/;
    }

    location ^~ /project3/ {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /project3/index.html;
    }

    location = /project3 {
        return 301 /project3/;
    }

    # ---------- 后端 API（FastAPI 等）：按你本机实际端口修改 ----------
    # 若服务跑在 8000，把 8002 改成 8000
    set $backend "http://127.0.0.1:8002";

    location / {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
    }
}
