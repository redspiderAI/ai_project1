# /project1、/project2、/project3 静态站点（与 nginx-snippet-project3.conf 同风格）
# 部署目录需存在：/var/www/html/project1、project2、project3（各含 index.html 与 assets/）
# 在 pd.conf 的 server { } 中 include 到 snippets 后，访问示例：https://redspiderbc.cn/project3/
#
# 【重要】若 pd.conf 里已有 location /project1/ 或 include ai-frontend-project2.conf 等，
# 不要再装本文件，否则会 duplicate location。请二选一：
#   - 删掉 pd.conf 里重复的 project1/project2 配置，只保留本 include；或
#   - 不要用 all123，改用 deploy -NginxSnippet project3（仅 /project3）

location ^~ /project1/assets/ {
    alias /var/www/html/project1/assets/;
    access_log off;
    expires 7d;
}

location ^~ /project1/ {
    root /var/www/html;
    index index.html;
    try_files $uri $uri/ /project1/index.html;
}

location = /project1 {
    return 301 /project1/;
}

location ^~ /project2/assets/ {
    alias /var/www/html/project2/assets/;
    access_log off;
    expires 7d;
}

location ^~ /project2/ {
    root /var/www/html;
    index index.html;
    try_files $uri $uri/ /project2/index.html;
}

location = /project2 {
    return 301 /project2/;
}

location ^~ /project3/assets/ {
    alias /var/www/html/project3/assets/;
    access_log off;
    expires 7d;
}

location ^~ /project3/ {
    root /var/www/html;
    index index.html;
    try_files $uri $uri/ /project3/index.html;
}

location = /project3 {
    return 301 /project3/;
}
