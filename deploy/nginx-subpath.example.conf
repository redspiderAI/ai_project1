# 静态目录：/home/project2/dist/（index.html、assets/）
# vite base 为 /project2/

location = /project2 {
    return 301 /project2/;
}

location ^~ /project2/ {
    alias /home/project2/dist/;
    index index.html;
    try_files $uri $uri/ @project2_spa;
}

# alias 与 try_files 最后一项容易 404，用命名 location 回退到 index.html
location @project2_spa {
    rewrite ^ /project2/index.html last;
}
