# 并入 server { }。站点：/var/www/html/project2/
#
# 错误原因：@ 命名块里若写 root /var/www/html + try_files /project2/index.html，
# Nginx 会内部重定向到 URI /project2/index.html，再次命中 ^~ /project2/，形成
# internal redirection cycle。命名块应 root 到项目目录，且 try_files 只用 /index.html。
#
# 前端生产构建默认请求同源 /api/v1（与页面同 :80），须反代到本机 FastAPI，否则接口 404。
# 若仍用浏览器直连 :8001，需在 FastAPI 配 CORS，否则跨域会 Failed to fetch。

location ^~ /api/v1/ {
    proxy_pass http://127.0.0.1:8001/api/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /project2 {
    return 301 /project2/;
}

location ^~ /project2/ {
    root /var/www/html;
    index index.html;
    try_files $uri $uri/ @project2_spa;
}

location @project2_spa {
    root /var/www/html/project2;
    try_files /index.html =404;
}
