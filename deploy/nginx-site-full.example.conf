# 完整示例：并入 sites-available 后 ln -s 到 sites-enabled。
# 按实际改 server_name、root、以及 FastAPI 地址（本机 8001 或内网 IP）。
#
# 步骤（Ubuntu 常见）：
#   sudo cp 本文件到 /etc/nginx/sites-available/redspiderbc.conf
#   按需编辑后：sudo nginx -t && sudo systemctl reload nginx
#
# 前端构建默认请求：http://你的域名/api/v1/... → 必须靠下面 location 反代到后端，否则会 404。

server {
    listen 80;
    listen [::]:80;
    server_name redspiderbc.cn www.redspiderbc.cn;

    # 接口：与前端 getApiBase() 生产环境默认「同源 /api/v1」一致
    location ^~ /api/v1/ {
        proxy_pass http://127.0.0.1:8001/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态站：dist 内容在 /var/www/html/project2/
    location = /project2 {
        return 301 /project2/;
    }

    location ^~ /project2/ {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ @project2_spa;
    }

    location @project2_spa {
        root /var/www/html/project2;
        try_files /index.html =404;
    }
}
